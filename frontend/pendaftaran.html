<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pendaftaran Siswa Baru - SDN Mekarsari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1e3a8a', // blue-700
                        secondary: '#f59e0b', // amber-500
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('pendaftaranApp', () => ({
                step: 1,
                maxStep: 6,
                loading: false,
                success: false,
                settings: {
                    school_name: 'SDN MEKARSARI',
                    school_logo: '',
                },
                formData: {
                    jenis_pendaftaran: 'Siswa Baru',
                    hobi: '',
                    cita_cita: '',
                    nama_lengkap: '',
                    nik: '',
                    no_telepon: '',
                    nisn: '',
                    kelas: '',
                    tempat_lahir: '',
                    tanggal_lahir: '',
                    no_akta: '',
                    jenis_kelamin: 'Laki-laki',
                    agama: 'Islam',
                    alamat: '',
                    tempat_tinggal: 'Bersama Orang Tua',
                    transportasi: 'Jalan Kaki',
                    nama_ayah: '', nik_ayah: '', tahun_lahir_ayah: '', pendidikan_ayah: 'SMA', pekerjaan_ayah: '', penghasilan_ayah: 'Kurang dari 1 Juta',
                    nama_ibu: '', nik_ibu: '', tahun_lahir_ibu: '', pendidikan_ibu: 'SMA', pekerjaan_ibu: '', penghasilan_ibu: 'Kurang dari 1 Juta',
                    nama_wali: '', nik_wali: '', tahun_lahir_wali: '', pendidikan_wali: '-', pekerjaan_wali: '-', penghasilan_wali: '-',
                    tinggi_badan: '', berat_badan: '', jumlah_saudara: '',
                    jarak_sekolah: 'Kurang dari 1 KM',
                    asal_sekolah: '', npsn_asal: '',
                    file_akta_base64: '',
                    file_kk_base64: '',
                    file_kip_base64: ''
                },

                async init() {
                    try {
                        const res = await fetch(`${GAS_URL}?action=getSettings`);
                        const json = await res.json();
                        if (json.status === 'success') {
                            this.settings = { ...this.settings, ...json.data };
                            if (this.settings.school_logo) {
                                this.settings.school_logo = this.fixUrl(this.settings.school_logo);
                                this.updateFavicon();
                            }
                        }
                    } catch (err) { console.error('Gagal memuat pengaturan pendaftaran'); }
                },

                fixUrl(url) {
                    if (!url) return "";
                    if (url.includes("drive.google.com/uc?id=")) {
                        const id = url.split("id=")[1].split("&")[0];
                        return `https://lh3.googleusercontent.com/d/${id}`;
                    }
                    return url;
                },

                updateFavicon() {
                    if (!this.settings.school_logo) return;
                    const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                    link.type = 'image/x-icon';
                    link.rel = 'shortcut icon';
                    link.href = this.settings.school_logo;
                    document.getElementsByTagName('head')[0].appendChild(link);
                },

                async handleFile(e, field) {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 2 * 1024 * 1024) {
                        Swal.fire('Oops!', 'Ukuran file maksimal 2MB', 'warning');
                        e.target.value = '';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        this.formData[field] = f.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                validateStep() {
                    if (this.step === 2) {
                        if (!this.formData.nama_lengkap || !this.formData.nik || !this.formData.tanggal_lahir) return false;
                        if (String(this.formData.nik).length !== 16) {
                            Swal.fire('Validasi NIK', 'NIK harus tepat 16 digit.', 'warning');
                            return false;
                        }
                        const birth = new Date(this.formData.tanggal_lahir);
                        const july1 = new Date(new Date().getFullYear(), 6, 1);
                        let age = july1.getFullYear() - birth.getFullYear();
                        const m = july1.getMonth() - birth.getMonth();
                        if (m < 0 || (m === 0 && july1.getDate() < birth.getDate())) {
                            age--;
                        }
                        if (age < 6) {
                            Swal.fire('Batas Usia', 'Maaf, calon peserta didik harus berusia minimal 6 tahun pada 1 Juli.', 'error');
                            return false;
                        }
                    }
                    if (this.step === 4) {
                        if (!this.formData.nama_ayah || !this.formData.nama_ibu) return false;
                    }
                    return true;
                },

                next() {
                    if (this.validateStep()) {
                        if (this.step < this.maxStep) this.step++;
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    }
                },

                prev() {
                    if (this.step > 1) this.step--;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },

                async submitForm() {
                    if (this.loading) return;
                    this.loading = true;
                    
                    Swal.fire({
                        title: 'Sedang Mengirim...',
                        text: 'Mohon tunggu sebentar, data sedang diproses.',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    try {
                        const res = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'saveStudent',
                                ...this.formData
                            })
                        });
                        const json = await res.json();
                        if (json.status === 'success') {
                            Swal.fire({
                                title: 'Pendaftaran Berhasil!',
                                html: `
                                    <div class="space-y-4">
                                        <p class="text-gray-600">Data pendaftaran Anda telah berhasil kami terima.</p>
                                        <div class="p-4 bg-emerald-50 border border-emerald-100 rounded-2xl mt-4">
                                            <p class="text-sm text-emerald-800 font-bold mb-3">PENTING: Silakan bergabung ke Grup WhatsApp untuk informasi selanjutnya:</p>
                                            <a href="https://chat.whatsapp.com/FW0VpHvNiac4NTKOj7PWzv" target="_blank" 
                                               class="inline-flex items-center justify-center gap-2 w-full px-6 py-3 bg-emerald-600 text-white font-bold rounded-xl shadow-lg hover:bg-emerald-700 transition-all">
                                               <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.445 0 .01 5.437.01 12.045c0 2.112.552 4.174 1.6 6.002L0 24l6.117-1.605a11.803 11.803 0 005.925 1.586h.005c6.602 0 12.038-5.438 12.038-12.046a11.817 11.817 0 00-3.483-8.402z"/></svg>
                                            Gabung Grup WhatsApp
                                        </a>
                                    </div>
                                </div>
                            `,
                                icon: 'success',
                                confirmButtonText: 'Kembali Ke Beranda',
                                confirmButtonColor: '#1e3a8a'
                            }).then(() => {
                                window.location.href = 'index.html';
                            });
                        } else {
                            Swal.fire('Gagal!', json.message || 'Terjadi kesalahan sistem.', 'error');
                        }
                    } catch (err) {
                        Swal.fire('Gagal!', 'Terjadi kesalahan koneksi ke server.', 'error');
                    } finally {
                        this.loading = false;
                    }
                }
            }));
        });
    </script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        .step-inactive {
            filter: grayscale(1) opacity(0.5);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #1e3a8a;
            ring-color: #1e3a8a;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans antialiased text-gray-900" x-data="pendaftaranApp" x-init="init()">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 font-bold text-lg text-primary">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Beranda</span>
            </a>
            <div class="hidden md:block">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Portal Penerimaan Peserta Didik
                    Baru</span>
            </div>
            <div class="w-24"></div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto py-10 px-4">

        <template x-if="!success">
            <div class="space-y-8">
                <!-- Header Section -->
                <div class="text-center">
                    <h1 class="text-3xl font-extrabold text-blue-700 tracking-tight">Formulir Pendaftaran</h1>
                    <p class="mt-2 text-gray-500">Mohon lengkapi data calon siswa dengan informasi yang valid sesuai
                        dokumen resmi.</p>
                </div>

                <!-- Progress Bar -->
                <div class="relative px-2">
                    <div class="flex justify-between items-center">
                        <template x-for="i in maxStep">
                            <div class="flex flex-col items-center z-10">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold transition-colors duration-500"
                                    :class="step >= i ? 'bg-primary text-white shadow-lg' : 'bg-white text-gray-300 border-2 border-gray-100'">
                                    <span x-text="i"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div class="absolute top-5 left-0 w-full h-1 bg-gray-100 -z-0 rounded"></div>
                    <div class="absolute top-5 left-0 h-1 bg-primary transition-all duration-500 rounded"
                        :style="`width: ${(step-1) * 20}%`"></div>
                </div>

                <!-- Error Alert -->
                <template x-if="errorMessage">
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded text-red-700 font-medium">
                        <span x-text="errorMessage"></span>
                    </div>
                </template>

                <!-- Form Card -->
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">

                    <!-- STEP 1: REGISTRASI -->
                    <div x-show="step === 1" x-cloak class="p-8 space-y-6 animate-in fade-in slide-in-from-right-4">
                        <h2 class="text-xl font-bold text-gray-800 border-b pb-4">1. Data Registrasi</h2>
                        <div class="grid grid-cols-1 gap-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Jenis Pendaftaran</label>
                                    <select x-model="formData.jenis_pendaftaran"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                        <option>Siswa Baru</option>
                                        <option>Pindahan</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">NISN *</label>
                                    <input type="number" x-model="formData.nisn" placeholder="10 digit (atau 0 jika belum punya)"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                </div>
                            </div>
                            <!-- Conditional Kelas for Pindahan -->
                            <template x-if="formData.jenis_pendaftaran === 'Pindahan'">
                                <div class="p-4 bg-amber-50 border border-amber-100 rounded-xl space-y-4 animate-in fade-in slide-in-from-top-2">
                                    <h3 class="text-sm font-bold text-amber-900 uppercase tracking-widest">Informasi Pindahan</h3>
                                    <div>
                                        <label class="block text-sm font-bold text-gray-700 mb-2">Daftar Ke Kelas Berapa? *</label>
                                        <select x-model="formData.kelas" class="w-full p-3 border rounded-lg bg-white outline-none">
                                            <option value="">Pilih Kelas Rombel</option>
                                            <option>Kelas 2</option>
                                            <option>Kelas 3</option>
                                            <option>Kelas 4</option>
                                            <option>Kelas 5</option>
                                            <option>Kelas 6</option>
                                        </select>
                                    </div>
                                </div>
                            </template>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Hobi</label>
                                    <input type="text" x-model="formData.hobi" placeholder="Misal: Membaca, Olahraga"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Cita-Cita</label>
                                    <input type="text" x-model="formData.cita_cita" placeholder="Misal: Dokter, Guru"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- STEP 2: IDENTITAS -->
                    <div x-show="step === 2" x-cloak class="p-8 space-y-6 animate-in fade-in slide-in-from-right-4">
                        <h2 class="text-xl font-bold text-gray-800 border-b pb-4">2. Identitas Calon Peserta Didik</h2>
                        <div class="grid grid-cols-1 gap-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Nama Lengkap (Sesuai Akta) *</label>
                                    <input type="text" x-model="formData.nama_lengkap" class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">No. HP / WhatsApp Aktif *</label>
                                    <input type="number" x-model="formData.no_telepon" placeholder="Contoh: 08123456789"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">NIK *</label>
                                    <input type="number" x-model="formData.nik" placeholder="16 digit sesuai KK"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                    <p class="text-[10px] text-gray-400 mt-1">Sistem akan menolak jika NIK kurang/lebih
                                        dari 16 digit.</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">No. Akta Kelahiran
                                        *</label>
                                    <input type="text" x-model="formData.no_akta"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Tempat Lahir</label>
                                    <input type="text" x-model="formData.tempat_lahir"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Tanggal Lahir *</label>
                                    <input type="date" x-model="formData.tanggal_lahir"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                    <p class="text-[10px] text-orange-500 mt-1">Berlaku syarat minimal 6 tahun pada 1
                                        Juli.</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Jenis Kelamin</label>
                                    <div class="flex gap-4">
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" value="Laki-laki" x-model="formData.jenis_kelamin">
                                            <span>Laki-laki</span>
                                        </label>
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" value="Perempuan" x-model="formData.jenis_kelamin">
                                            <span>Perempuan</span>
                                        </label>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Agama</label>
                                    <select x-model="formData.agama"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                        <option>Islam</option>
                                        <option>Katolik</option>
                                        <option>Protestan</option>
                                        <option>Hindu</option>
                                        <option>Budha</option>
                                        <option>Lainnya</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- STEP 3: ALAMAT -->
                    <div x-show="step === 3" x-cloak class="p-8 space-y-6 animate-in fade-in slide-in-from-right-4">
                        <h2 class="text-xl font-bold text-gray-800 border-b pb-4">3. Data Alamat</h2>
                        <div class="grid grid-cols-1 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">Alamat Tinggal Lengkap</label>
                                <textarea x-model="formData.alamat" rows="3"
                                    placeholder="Nama Jalan, RT/RW, Desa, Kecamatan"
                                    class="w-full p-3 border rounded-lg bg-gray-50 outline-none"></textarea>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Tempat Tinggal</label>
                                    <select x-model="formData.tempat_tinggal"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                        <option>Bersama Orang Tua</option>
                                        <option>Wali</option>
                                        <option>Kos / Lainnya</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-gray-700 mb-2">Moda Transportasi</label>
                                    <select x-model="formData.transportasi"
                                        class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                        <option>Jalan Kaki</option>
                                        <option>Antar Jemput Motor</option>
                                        <option>Antar Jemput Mobil</option>
                                        <option>Kendaraan Umum</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- STEP 4: DATA ORANG TUA -->
                    <div x-show="step === 4" x-cloak class="p-8 space-y-8 animate-in fade-in slide-in-from-right-4">
                        <h2 class="text-xl font-bold text-gray-800 border-b pb-4">4. Identitas Orang Tua / Wali</h2>

                        <!-- AYAH -->
                        <div class="p-4 bg-gray-50 rounded-xl space-y-4">
                            <h3 class="font-bold text-primary flex items-center gap-2">
                                <span
                                    class="w-6 h-6 bg-primary text-white text-xs flex items-center justify-center rounded-full">A</span>
                                Data Ayah Kandung
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" x-model="formData.nama_ayah" placeholder="Nama Ayah *"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                <input type="number" x-model="formData.nik_ayah" placeholder="NIK Ayah"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                <input type="number" x-model="formData.tahun_lahir_ayah" placeholder="Tahun Lahir Ayah"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                <select x-model="formData.pekerjaan_ayah"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                    <option value="">Pekerjaan Ayah</option>
                                    <option>Petani</option>
                                    <option>Buruh</option>
                                    <option>Wiraswasta</option>
                                    <option>PNS/TNI/POLRI</option>
                                    <option>Tidak Bekerja</option>
                                </select>
                                <select x-model="formData.penghasilan_ayah"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                    <option value="">Penghasilan Bulanan</option>
                                    <option>
                                        < 1 Juta</option>
                                    <option>1 - 2 Juta</option>
                                    <option>2 - 5 Juta</option>
                                    <option>> 5 Juta</option>
                                </select>
                            </div>
                        </div>

                        <!-- IBU -->
                        <div class="p-4 bg-gray-50 rounded-xl space-y-4">
                            <h3 class="font-bold text-pink-600 flex items-center gap-2">
                                <span
                                    class="w-6 h-6 bg-pink-600 text-white text-xs flex items-center justify-center rounded-full">I</span>
                                Data Ibu Kandung
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" x-model="formData.nama_ibu" placeholder="Nama Ibu *"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                <input type="number" x-model="formData.nik_ibu" placeholder="NIK Ibu"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                <input type="number" x-model="formData.tahun_lahir_ibu" placeholder="Tahun Lahir Ibu"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                <select x-model="formData.pekerjaan_ibu"
                                    class="w-full p-3 border rounded-lg bg-white outline-none">
                                    <option value="">Pekerjaan Ibu</option>
                                    <option>Ibu Rumah Tangga</option>
                                    <option>Petani</option>
                                    <option>Buruh</option>
                                    <option>Wiraswasta</option>
                                    <option>PNS/TNI/POLRI</option>
                                </select>
